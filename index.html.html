<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Gym Tondola - Oficial</title>
				<style>
					:root { --red: #e63946; --bg: #0b0b0b; --card: #1a1a1a; --gold: #ffb703; --white: #ffffff; }
					body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding-bottom: 80px; overflow-x: hidden; }

					.brand-box { padding: 20px; border: 2px solid var(--white); display: inline-block; margin-bottom: 20px; position: relative; text-align: center; }
					.brand-box::before { content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; border: 1px solid var(--red); }
					.main-title { display: block; font-size: 24px; font-weight: 900; letter-spacing: 4px; color: var(--white); margin: 0; line-height: 1; }
					.sub-title { display: block; font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-top: 8px; text-transform: uppercase; }

					#registro-inicial { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
					.form-registro { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--red); width: 90%; max-width: 400px; text-align: center; }

					header { padding: 15px; text-align: center; background: #111; border-bottom: 3px solid var(--red); }
					.input-gym { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
					.btn-red { background: var(--red); color: white; border: none; width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }

					.page { display: none; padding: 20px; animation: fadeIn 0.3s; }
					.active-page { display: block !important; }
					@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

					.grid-tienda { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
					.producto { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
					.producto img { width: 100%; height: 120px; object-fit: cover; border-bottom: 1px solid #333; }

					#modal-pago { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
					.modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; border: 1px solid var(--gold); }
					.btn-pago { margin-top: 10px; font-size: 0.8rem; }

					nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
					nav button { background: none; border: none; color: #666; font-size: 0.7rem; cursor: pointer; }
					nav button.active { color: var(--red); }
				</style>
			</head>
	<body>

		<div id="registro-inicial">
			<div class="brand-box">
				<span class="main-title">GYM TONDOLA</span>
				<span class="sub-title">(NO PAIN NO GAIN)</span>
			</div>
			<div class="form-registro">
				<input type="text" id="reg-nombre" class="input-gym" placeholder="Nombre y Apellido">
					<button onclick="registrar()" class="btn-red">INGRESAR</button>
				</div>
		</div>

		<header>
			<h1>GYM TONDOLA</h1>
		</header>

		<div id="page-tienda" class="page active-page">
			<h3 style="color:var(--gold)">🛒 TIENDA</h3>
			<div class="grid-tienda" id="lista-productos"></div>
		</div>

		<div id="page-gym" class="page">
			<h3>ZONA SOCIOS</h3>
			<div id="bloqueo">
				<input type="password" id="pass-socio" class="input-gym" placeholder="Contraseña de Socio">
					<button onclick="checkSocio()" class="btn-red">ENTRAR</button>
				</div>
			<div id="rutinas-content" style="display:none; background:#222; padding:20px; border-radius:15px;">
				<p>✅ Acceso concedido.</p>
			</div>
		</div>

		<div id="page-admin" class="page">
			<button onclick="navegar('tienda')" style="color:var(--red); background:none; border:none; margin-bottom:10px;">← Volver</button>
			<div style="background:#222; padding:15px; border-radius:10px;">
				<h3>AÑADIR PRODUCTO</h3>
				<input type="text" id="adm-n" class="input-gym" placeholder="Nombre Producto">
					<input type="number" id="adm-p" class="input-gym" placeholder="Precio (Bs)">
						<input type="text" id="adm-i" class="input-gym" placeholder="URL de la imagen">
							<button onclick="addP()" class="btn-red" style="background:#28a745">GUARDAR PRODUCTO</button>
						</div>
		</div>

		<div id="modal-pago">
			<div class="modal-content">
				<h2 style="color:var(--gold); margin:0;">OPCIONES DE PAGO</h2>
				<p id="detalles-pago" style="font-weight: bold; margin: 15px 0;"></p>
				<button onclick="confirmarVenta('PAGO TOTAL', 'TOTAL')" class="btn-red btn-pago">PAGAR TOTAL (QR)</button>
				<button onclick="confirmarVenta('PAGAR LA MITAD', 'MITAD')" class="btn-red btn-pago" style="background:#444;">PAGAR MITAD (QR)</button>
				<button onclick="confirmarVenta('RESERVA', 'RESERVA')" class="btn-red btn-pago" style="background:none; border:1px solid var(--gold); color:var(--gold);">RESERVAR (EFECTIVO EN GYM)</button>
				<button onclick="cerrarPago()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer;">Cancelar</button>
			</div>
		</div>

		<nav>
			<button onclick="navegar('tienda')" id="nav-tienda" class="active">
				🛒<br>TIENDA</button>
			<button onclick="navegar('gym')" id="nav-gym">
				💪<br>SOCIOS</button>
			<button onclick="entrarAdmin()" style="opacity:0.1">⚙️</button>
		</nav>

		<script>
			let userName = "";
			let seleccionado = null;
			let prods = [{id:1, n:"Creatina 500g", p:350, i:"https://via.placeholder.com/150"}];

			function registrar() {
			const input = document.getElementById('reg-nombre').value;
			if(input.length > 2) { userName = input; document.getElementById('registro-inicial').style.display='none'; render(); }
			}

			function navegar(id) {
			document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
			document.getElementById('page-' + id).classList.add('active-page');
			}

			function render() {
			const c = document.getElementById('lista-productos');
			c.innerHTML = prods.map(p => `
			<div class="producto">
				<img src="${p.i}" onerror="this.src='https://via.placeholder.com/150'">
					<div style="padding:10px">
						<span style="font-size:0.75rem">${p.n}</span>
						<br>
							<b style="color:var(--gold)">${p.p} Bs.</b>
							<br>
								<button onclick="abrirPago(${p.id})" class="btn-red" style="padding:5px; margin-top:5px; font-size:0.7rem; width:100%;">COMPRAR</button>
							</div>
				</div>
			`).join('');
			}

			function abrirPago(id) {
			seleccionado = prods.find(p => p.id === id);
			document.getElementById('detalles-pago').innerText = `${seleccionado.n} - ${seleccionado.p} Bs.`;
			document.getElementById('modal-pago').style.display = 'flex';
			}

			function cerrarPago() { document.getElementById('modal-pago').style.display = 'none'; }

			function confirmarVenta(tipoLabel, etiqueta) {
			let monto = (etiqueta === 'MITAD') ? seleccionado.p / 2 : seleccionado.p;
			let msg = "";

			if(etiqueta === 'RESERVA') {
			msg = `Hola Gym Tondola, mi nombre es *${userName}*. Quiero *RESERVAR* el producto *${seleccionado.n}* para pagarlo en efectivo en el gym. [RESERVA-GYM]`;
			} else {
			msg = `Hola Gym Tondola, mi nombre es *${userName}*. Acabo de pagar el *${tipoLabel}* de *${seleccionado.n}* por un monto de *${monto} Bs.* Adjunto mi comprobante. [PAGO-${etiqueta}]`;
			}

			window.open(`https://wa.me/59167225336?text=${encodeURIComponent(msg)}`);
			cerrarPago();
			}

			function addP() {
			const n = document.getElementById('adm-n').value;
			const p = document.getElementById('adm-p').value;
			const i = document.getElementById('adm-i').value || "https://via.placeholder.com/150";
			if(n && p) { prods.push({id: Date.now(), n: n, p: p, i: i}); render(); alert("Producto añadido"); navegar('tienda'); }
			}

			function entrarAdmin() { if(prompt("Clave Admin:") === "3812") navegar('admin'); }

			function checkSocio() { if(document.getElementById('pass-socio').value === "TONDOLA2026") { document.getElementById('bloqueo').style.display='none'; document.getElementById('rutinas-content').style.display='block'; } }

			render();
		</script>
	</body>
</html>
